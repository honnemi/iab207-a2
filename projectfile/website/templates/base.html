<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IAB207 Assignment 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

</head>

<body>
    <!-- Header -->
    <header>

        <!-- Navbar -->
        <nav>
            <!--Just a basic one for now, will update once we figure out the overall structure of our website-->
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">WatchParty</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavDropdown">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="{{url_for('main.view_events')}}">Home</a>
                            </li>
                        </ul>

                        <!--In the future, will show current user's name if logged in and a logout button instead-->
                        <ul class="navbar-nav ms-auto d-flex align-items-center">
                            <!--In the future, only show dropdown when logged in-->
                            <li class="nav-item dropdown me-3">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    Guest
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="{{url_for('bookings.show_bookings')}}">My Bookings</a></li>
                                </ul>
                            </li>

                            <li class="nav-item me-2">
                                <a class="btn btn-outline-primary btn-sm" href="{{url_for('main.login_testing')}}">Login/Register</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </nav>
        <!-- Code for using Flask flash -->
        <div class="container-fluid">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in get_flashed_messages() %}
            <div class="alert alert-warning">
                <button type="button" class="close" data-dismiss="alert" aria-label="close">x</button>
                {{message}}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>
        {% block header %}

        {% endblock %}

    </header>

    {% block content %}

    {% endblock %}

    <footer class="footer">
        <!-- Your footer should go here -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>

</html>
