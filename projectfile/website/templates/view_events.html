{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2>All Events</h2>

    <div class="row">
        {% for event in events %}
        <div class="col-md-4">
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ event.title }}</h5>
                    <p class="card-text">{{ event.location }}</p>

                    <a href="{{ url_for('main.event_detail', event_id=event.id) }}"
                       class="btn btn-primary">
                        View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
